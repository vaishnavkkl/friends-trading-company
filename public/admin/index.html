<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Friends Trading CMS</title>
</head>
<body>
  <script>
    // 1. Tell Decap we will provide the config manually
    window.CMS_MANUAL_INIT = true;
  </script>
  
  <script src="https://unpkg.com/decap-cms@^3.1.0/dist/decap-cms.js"></script>
  
  <script>
    const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const repoName = 'friends-trading-company';

    // 2. Initialize with the dynamic config
    CMS.init({
      config: {
        local_backend: isLocal,
        backend: {
          name: 'github',
          repo: 'vaishnavkkl/friends-trading-company',
          branch: 'main',
          base_url: 'https://friends-trading-decap.vaishnavkkl25.workers.dev/',
        },
        site_url: 'https://vaishnavkkl.github.io/friends-trading-company',
        display_url: 'https://vaishnavkkl.github.io/friends-trading-company',
        media_folder: 'public/images/uploads',
        public_folder: isLocal ? '/images/uploads' : `/${repoName}/images/uploads`,
        collections: [
          {
            name: 'catalog',
            label: 'Store Management',
            files: [
              {
                label: 'Featured Deals (Home Page)',
                name: 'products_list',
                file: 'data/products.json',
                fields: [
                  {
                    label: 'Featured Products',
                    name: 'featuredProducts',
                    widget: 'list',
                    summary: '{{fields.name}} ({{fields.price}})',
                    fields: [
                      { label: 'Product Name', name: 'name', widget: 'string', required: true },
                      { 
                        label: 'Auto ID / Slug', 
                        name: 'productSlug', 
                        widget: 'slug', 
                        fromField: 'name',
                        required: true,
                        hint: 'Lower-case letters, numbers and hyphens only. Auto-generated from name.'
                      },
                      { label: 'Brand', name: 'brand', widget: 'string', required: true },
                      { 
                        label: 'Category Name', 
                        name: 'category', 
                        widget: 'select',
                        required: true,
                        options: [
                          'Mobiles', 
                          'Laptops', 
                          'Power Banks', 
                          'TWS & Headsets', 
                          'Accessories', 
                          'Services'
                        ]
                      },
                      { 
                        label: 'Category Slug (Internal)', 
                        name: 'slug', 
                        widget: 'select',
                        required: true,
                        options: [
                          { label: 'mobiles', value: 'mobiles' },
                          { label: 'laptops', value: 'laptops' },
                          { label: 'power-banks', value: 'power-banks' },
                          { label: 'tws-headsets', value: 'tws-headsets' },
                          { label: 'accessories', value: 'accessories' },
                          { label: 'services', value: 'services' }
                        ],
                        hint: 'MUST match the category selection above.'
                      },
                      { 
                        label: 'Price', 
                        name: 'price', 
                        widget: 'string', 
                        required: true,
                        hint: 'e.g. From SAR 1,699' 
                      },
                      { 
                        label: 'Market Price (Optional)', 
                        name: 'originalPrice', 
                        widget: 'string', 
                        required: false,
                        hint: 'e.g. Market SAR 1,899+' 
                      },
                      { 
                        label: 'Condition', 
                        name: 'condition', 
                        widget: 'select',
                        required: true,
                        options: ['New', 'Refurbished', 'Open Box', 'Pre-owned', 'Budget']
                      },
                      { label: 'Product Image', name: 'image', widget: 'image', required: true },
                      { label: 'Quick Summary', name: 'summary', widget: 'text', required: true },
                      { label: 'Bullet Points (Details)', name: 'details', widget: 'list', required: true, min: 1 },
                      { 
                        label: 'Source Name (for credit)', 
                        name: 'sourceName', 
                        widget: 'string', 
                        default: 'Unsplash',
                        required: true 
                      },
                      { 
                        label: 'Source URL (for credit)', 
                        name: 'sourceUrl', 
                        widget: 'string', 
                        default: 'https://unsplash.com',
                        required: true,
                        pattern: ['^https?://.*', 'Must be a valid URL starting with http:// or https://']
                      }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
    });

    // 3. Fail-safe login handler
    window.addEventListener('message', (event) => {
      if (event.data && (typeof event.data === 'string' && event.data.includes('success'))) {
        try {
          const data = typeof event.data === 'string' ? JSON.parse(event.data.split('success:')[1]) : event.data;
          if (data.token) {
            localStorage.setItem('decap-cms-user', JSON.stringify({
              backendName: 'github',
              token: data.token,
              provider: 'github'
            }));
            window.location.reload();
          }
        } catch (e) { console.error(e); }
      }
    }, false);
  </script>
</body>
</html>
